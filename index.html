        :root {
            --bg: #0a1118;         /* Fondo oscuro azulado profundo */
            --celeste: #74acdf;    /* Celeste de la bandera */
            --blanco: #ffffff;     /* Blanco de la bandera */
            --oro: #f6b426;        /* Oro del sol de mayo */
            --alert: #ff003c;
            --text: #ffffff;
            --font-glitch: 'Rubik Glitch', system-ui;
            --font-tech: 'Michroma', sans-serif;
            --font-code: 'Source Code Pro', monospace;
            --font-heavy: 'Teko', sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: 
                linear-gradient(rgba(10,17,24,0.85), rgba(10,17,24,0.85)),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150" viewBox="0 0 150 150"><text x="0" y="20" fill="rgba(116,172,223,0.07)" font-family="monospace" font-size="10">ARG_NODO_UT_SYSTEM_BRECHA</text></svg>'),

            color: var(--text);
            font-family: var(--font-code);
            margin: 0;
            text-transform: uppercase;
            overflow-x: hidden;
            width: 100%;
        }

        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            z-index: 9998;
            background-size: 100% 2px;
            pointer-events: none;
        }

        header {
            padding-top: 40px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .main-logo {
            width: 300px; 
            max-width: 80%;
            filter: drop-shadow(0 0 15px var(--celeste));
            z-index: 5;
            animation: glitch-img 4s infinite;
        }

        @keyframes glitch-img {
            0% { transform: translate(0); }
            1% { transform: translate(-2px, 1px); filter: hue-rotate(20deg); }
            2% { transform: translate(2px, -1px); filter: hue-rotate(-20deg); }
            3% { transform: translate(0); filter: none; }
        }

        .hacker-number {
            font-family: var(--font-glitch);
            font-size: 12rem;
            line-height: 0.7;
            color: #000;
            text-shadow: 2px 2px 0 var(--celeste), -2px -2px 0 var(--oro);
            margin: -10px 0 30px 0;
            transform: rotate(-3deg);
            z-index: 10;
        }

        .countdown-container {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .cd-box {
            background: rgba(10,17,24,0.9);
            border: 1px solid var(--celeste);
            padding: 15px;
            min-width: 75px;
            box-shadow: 4px 4px 0 var(--oro);
        }

        .cd-box span {
            display: block;
            font-family: var(--font-heavy);
            font-size: 2.8rem;
            color: var(--blanco);
            line-height: 1;
            text-shadow: 0 0 5px var(--celeste);
        }

        .cd-box label { font-size: 0.6rem; color: var(--celeste); font-weight: 900; }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px 100px 20px;
            width: 100%;
        }

        .grid-system {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
        }

        .status-box {
            border: 1px solid #1a2634;
            background: rgba(5,10,15,0.9);
            padding: 20px;
            text-align: center;
            box-shadow: inset 0 0 10px rgba(116,172,223,0.1);
        }

        .status-box h3 { font-family: var(--font-glitch); font-size: 0.9rem; color: var(--celeste); margin-top: 0; }

        .prize-card {

            border: 2px solid var(--celeste);
            padding: 30px;
            text-align: center;
            background: #050a0f;
            position: relative;
            margin: 20px 0;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(116,172,223,0.1);
        }

        .prize-card::before {
            content: "EL BOTÍN MUNDIAL";
            position: absolute; top: 0; left: 0;
            background: var(--oro); color: black;
            padding: 5px 15px; font-family: var(--font-heavy); font-size: 1.2rem;
            font-weight: bold;
        }
