backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "microblog"
    label: "Mis Tweets"
    folder: "microblog/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    identifier_field: date
    fields:
      - { label: "Título de control (No se ve en el tweet)", name: "title", widget: "string" }
      - { label: "Fecha", name: "date", widget: "datetime" }
      - { label: "¿Qué estás rompiendo o arreglando hoy?", name: "body", widget: "text" }
      - { label: "Foto opcional", name: "foto", widget: "image", required: false }
      - { label: "Código de Video incrustado (Iframe / URL)", name: "video", widget: "text", required: false }
