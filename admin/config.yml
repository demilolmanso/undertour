backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "microblog"
    label: "Equipos"
    folder: "microblog/posts"
    extension: "json"
    format: "json"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    identifier_field: date
    fields:
      - { label: "Nombre del equipo", name: "title", widget: "string" }
      - { label: "Fecha (con el boton -Now- se pone automaticamente)", name: "date", widget: "datetime" }
      - { label: "Aca escribis lo que quieras, por ejemplo una descripcion del equipo ingresado", name: "body", widget: "text" }
      - { label: "Foto opcional, basicamente cualquier imagen", name: "foto", widget: "image", required: false }
