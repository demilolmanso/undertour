<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UT | TRANSMISIONES_DE_LA_BRECHA</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&family=Source+Code+Pro:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Source Code Pro', monospace;
            padding: 40px 20px;
            margin: 0;
        }
        .blog-header { 
            text-align: center; 
            font-family: 'Rubik Glitch', system-ui; 
            color: #7012b3; 
            font-size: 2.5rem; 
            text-transform: uppercase;
        }
        .post-card {
            border: 1px solid #7012b3;
            background: rgba(5,5,5,0.9);
            padding: 20px;
            margin: 20px auto;
            max-width: 600px;
            box-shadow: 4px 4px 0 #82c91e;
        }
        .post-card h2 { color: #82c91e; margin-top: 0; text-transform: uppercase;}
        .post-card p { line-height: 1.5; color: #e0e0e0; }
        .post-card a { 
            color: #fff; 
            text-decoration: none; 
            font-weight: bold; 
            display: inline-block; 
            margin-top: 10px; 
            border: 1px solid #82c91e; 
            padding: 5px 10px;
            transition: all 0.2s ease;
        }
        .post-card a:hover {
            background: #82c91e;
            color: #000;
        }
        .date-tag {
            color: #a0a0a0; 
            font-size: 0.8rem;
            display: block;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <h1 class="blog-header">NODO_BLOG_INFILTRADO</h1>
    <div id="blog-posts-container"></div>

    <script>
        // Lista manual con los dos ID que figuran en tus capturas de pantalla de hoy
        const posts = [
            '2026-06-13-2026-06-13t10-19-00-000-03-00',
            '2026-06-13-2026-06-13t10-13-00-000-03-00'
        ];

        const container = document.getElementById('blog-posts-container');

        async function loadPosts() {
            if (posts.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#7012b3;">NO SE ENCONTRARON TRANSMISIONES ACTIVAS...</p>';
                return;
            }

            for (const slug of posts) {
                try {
                    // Apunta directo a la carpeta e intenta leer el JSON estructurado
                    const response = await fetch(`/microblog/posts/${slug}.json`);
                    
                    if (!response.ok) throw new Error(`Nodo inaccesible o archivo inexistente.`);
                    
                    const data = await response.json();
                    
                    const postElement = document.createElement('article');
                    postElement.className = 'post-card';
                    postElement.innerHTML = `
                        <h2>${data.title || 'TRANSMISIÓN SIN TÍTULO'}</h2>
                        <span class="date-tag">FECHA: ${data.date ? new Date(data.date).toLocaleDateString() : 'DESCONOCIDA'}</span>
                        <p>${data.description || data.body || 'Sin contenido o descripción disponible.'}</p>
                        <a href="/Lista/post.html?id=${slug}">LEER_TRANSMISION_&gt;</a>
                    `;
                    container.appendChild(postElement);
                } catch (error) {
                    console.error("Error cargando el post:", error);
                    const errorNotice = document.createElement('p');
                    errorNotice.style.cssText = "color: #ff3333; text-align: center; font-size: 0.8rem;";
                    errorNotice.innerText = `[ERROR: Sincronización fallida con subnodo "${slug.substring(0,15)}..."]`;
                    container.appendChild(errorNotice);
                }
            }
        }

        loadPosts();
    </script>
</body>
</html>
