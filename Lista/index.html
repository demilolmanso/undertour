<!DOCTYPE html>
<html lang="es">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UT | Lista_de_equipos</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&family=Michroma&family=Teko:wght@700&family=Source+Code+Pro:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a1118;         /* Fondo oscuro azulado profundo */
            --celeste: #74acdf;    /* El celeste oficial de la selección */
            --blanco: #ffffff;     /* Blanco puro para contrastes masivos */
            --dorado: #f1c40f;     /* Oro para los destaques de campeón */
            --text: #ffffff;
            --font-glitch: 'Rubik Glitch', system-ui;
            --font-tech: 'Michroma', sans-serif;
            --font-code: 'Source Code Pro', monospace;
            --font-heavy: 'Teko', sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: 
                linear-gradient(rgba(10, 17, 24, 0.85), rgba(10, 17, 24, 0.85)), 
                url('fondo.png'); 
            background-size: cover;         
            background-position: center;    
            background-attachment: fixed;  
            background-repeat: no-repeat;
            color: var(--text);
            font-family: var(--font-code);
            margin: 0;
            text-transform: uppercase;
            overflow-x: hidden;
            width: 100%;
            padding: 40px 20px 120px 20px;
        }

        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.35) 50%);
            z-index: 9998;
            background-size: 100% 2px;
            pointer-events: none;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 0;
            z-index: 5;
        }

        .tournament-logo {
            width: 5000px;          
            height: auto;          
            max-width: 45%;        
            filter: drop-shadow(0 0 15px var(--celeste)); 
            animation: glitch-img 4s infinite; 
        }

        @keyframes glitch-img {
            0% { transform: translate(0); }
            1% { transform: translate(-2px, 1px); filter: hue-rotate(180deg); } 
            2% { transform: translate(2px, -1px); filter: brightness(1.5); }
            3% { transform: translate(0); filter: none; }
        }

        /* Botón Volver Estilo Hacker */
        .back-btn-container {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 30px;
            z-index: 10;
            position: relative;
        }

        .back-btn {
            background: transparent;
            color: var(--celeste);
            border: 1px solid var(--celeste);
            padding: 12px 30px;
            font-family: var(--font-code);
            font-size: 0.9rem;
            font-weight: 900;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 4px 4px 0 rgba(116, 172, 223, 0.2);
            letter-spacing: 2px;
        }

        .back-btn:hover {
            background: var(--celeste);
            color: #000;
            box-shadow: 4px 4px 0 var(--blanco);
        }

        .blog-header { 
            text-align: center; 
            font-family: var(--font-glitch); 
            color: var(--celeste); 
            font-size: 3rem; 
            margin-top: 10px;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.5);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .post-card {
            border: 2px solid var(--celeste);
            background: #050a0f;
            padding: 40px;
            margin: 30px auto;
            max-width: 750px;
            box-shadow: 0 0 15px rgba(116, 172, 223, 0.1);
            position: relative;
        }

        .post-card h2 { 
            font-family: var(--font-glitch); 
            color: var(--celeste); 
            margin-top: 0; 
            font-size: 1.6rem;
            border-bottom: 1px dashed rgba(116, 172, 223, 0.4);
            padding-bottom: 10px;
        }

        .post-card p { 
            line-height: 1.6; 
            color: var(--blanco); 
            white-space: pre-wrap; 
            margin-bottom: 0; 
            font-size: 15px;
            border-left: 3px solid var(--blanco);
            padding-left: 15px;
        }

        .date-tag {
            color: var(--dorado); 
            font-size: 0.75rem;
            display: block;
            margin-bottom: 15px;
            font-family: var(--font-code);
            letter-spacing: 1px;
        }

        #loading { 
            text-align: center; 
            color: var(--celeste); 
            font-size: 1rem; 
            font-family: var(--font-code);
            letter-spacing: 2px;
            animation: blink-msg 2s infinite;
        }

        @keyframes blink-msg {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .live-tag {
            position: fixed; bottom: 30px; right: 30px; background: #000000;
            color: white; padding: 12px 20px; text-decoration: none;
            font-family: var(--font-heavy); border: 2px solid var(--celeste); z-index: 1000;
            animation: blink 1s infinite;
            text-transform: uppercase;
        }

        @keyframes blink { 50% { opacity: 0.7; } }

        .insta-tag { bottom: 90px !important; background: #e1306c !important; }
        .tiktok-tag { bottom: 150px !important; background: #010101 !important; border-color: #00f2fe !important; box-shadow: 2px 2px 0 #fe0979; }
        .fb-tag { bottom: 210px !important; background: #1877f2 !important; }

        footer { text-align: center; padding: 40px 20px; font-size: 0.6rem; color: #1a2635; letter-spacing: 5px; margin-top: 60px;}

        @media (max-width: 768px) {
            .tournament-logo { width: 135px; }
            .blog-header { font-size: 2rem; }
            .post-card { padding: 25px 15px; }
            .back-btn { font-size: 0.8rem; padding: 10px 20px; }
            .live-tag { bottom: 15px; right: 15px; padding: 8px 15px; font-size: 0.8rem; }
            .tiktok-tag { bottom: 115px !important; }
            .fb-tag { bottom: 165px !important; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logoUT.png" class="tournament-logo" alt="Logo Underground Tournament">
        </div>
    </header>

    <div class="back-btn-container">
        <a href="https://undergroundtournament.com/" class="back-btn">< VOLVER_ATRÁS</a>
    </div>

    <div class="container">
        <h1 class="blog-header">LISTA DE EQUIPOS</h1>
        
        <div id="blog-posts-container">
            <p id="loading">[CONECTANDO CON EL UNDERSERVER...]</p>
        </div>
    </div>

    <a href="https://www.youtube.com/@UnderTourChannel" target="_blank" class="live-tag">
        ● UT en Youtube
    </a>
    <a href="https://www.instagram.com/undertourhere/" target="_blank" class="live-tag insta-tag">
        ● UT en Instagram
    </a>
    <a href="https://www.facebook.com/share/18yig4K5zS/" target="_blank" class="live-tag fb-tag">
        ● UT en Facebook
    </a>
    <a href="https://www.tiktok.com/@undergroundtourna?_r=1&_t=ZS-96vxB1xpMZ8" target="_blank" class="live-tag tiktok-tag">
        ● UT en TikTok
    </a>
   
    <footer>UT_MMXIV // CHAPADMALAL // BSAS_ARG</footer>

    <script>
        const USER = 'demilolmanso';
        const REPO = 'undertour';
        const FOLDER_PATH = 'microblog/posts';

        const container = document.getElementById('blog-posts-container');

        async function fetchAllPosts() {
            try {
                const githubApiUrl = `https://api.github.com/repos/${USER}/${REPO}/contents/${FOLDER_PATH}`;
                const repoResponse = await fetch(githubApiUrl);
                
                if (!repoResponse.ok) throw new Error("No se pudo obtener la lista de transmisiones.");
                
                const files = await repoResponse.json();
                const jsonFiles = files.filter(file => file.name.endsWith('.json'));

                if (jsonFiles.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color: var(--celeste); font-family: var(--font-code);">[NO HAY EQUIPOS REGISTRADOS AUN...]</p>';
                    return;
                }

                container.innerHTML = ''; 
                let loadedPosts = [];

                for (const file of jsonFiles) {
                    try {
                        const fileResponse = await fetch(`/${FOLDER_PATH}/${file.name}`);
                        if (fileResponse.ok) {
                            const data = await fileResponse.json();
                            loadedPosts.push(data);
                        }
                    } catch (e) {
                        console.error("Error al procesar archivo individual:", e);
                    }
                }

                loadedPosts.sort((a, b) => new Date(b.date) - new Date(a.date));

                loadedPosts.forEach(data => {
                    const postElement = document.createElement('article');
                    postElement.className = 'post-card';
                    
                    postElement.innerHTML = `
                        ${data.title ? `<h2>${data.title}</h2>` : ''}
                        <span class="date-tag">REGISTRO_LOG // FECHA: ${data.date ? new Date(data.date).toLocaleDateString() : 'DESCONOCIDA'}</span>
                        <p>${data.body || data.description || 'Sin datos de manifiesto.'}</p>
                    `;
                    container.appendChild(postElement);
                });

            } catch (error) {
                console.error("Error global del sistema:", error);
                container.innerHTML = '<p style="text-align:center; color:#ff3333; font-family: var(--font-code);">[ERROR CRÍTICO: FALLO DE SINCRONIZACIÓN CON EL REPOSITORIO DE LA BRECHA]</p>';
            }
        }

        fetchAllPosts();
    </script>
</body>
</html>
