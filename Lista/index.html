<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UT | TRANSMISIONES_DE_LA_BRECHA</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&family=Source+Code+Pro:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Source Code Pro', monospace;
            padding: 40px 20px;
            margin: 0;
        }
        .blog-header { 
            text-align: center; 
            font-family: 'Rubik Glitch', system-ui; 
            color: #7012b3; 
            font-size: 2.5rem; 
            text-transform: uppercase;
        }
        .post-card {
            border: 1px solid #7012b3;
            background: rgba(5,5,5,0.9);
            padding: 20px;
            margin: 20px auto;
            max-width: 600px;
            box-shadow: 4px 4px 0 #82c91e;
        }
        .post-card h2 { color: #82c91e; margin-top: 0; text-transform: uppercase;}
        .post-card p { line-height: 1.5; color: #e0e0e0; }
        .post-card a { 
            color: #fff; 
            text-decoration: none; 
            font-weight: bold; 
            display: inline-block; 
            margin-top: 10px; 
            border: 1px solid #82c91e; 
            padding: 5px 10px;
            transition: all 0.2s ease;
        }
        .post-card a:hover {
            background: #82c91e;
            color: #000;
        }
        .date-tag {
            color: #a0a0a0; 
            font-size: 0.8rem;
            display: block;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <h1 class="blog-header">NODO_BLOG_INFILTRADO</h1>
    <div id="blog-posts-container"></div>

    <script>
        // 🛠️ COPIA Y PEGA ACÁ EL NOMBRE EXACTO DEL ARCHIVO NUEVO QUE SE CREÓ EN TU GITHUB
        // (Búscalo en la carpeta microblog/posts/ y ponelo acá sin el .json)
        const posts = [
            'pon-aqui-el-nombre-del-archivo-nuevo'
        ];

        const container = document.getElementById('blog-posts-container');

        async function loadPosts() {
            if (posts.length === 0 || posts[0] === 'pon-aqui-el-nombre-del-archivo-nuevo') {
                container.innerHTML = '<p style="text-align:center; color:#7012b3;">[SISTEMA] POR FAVOR, INGRESA UN NOMBRE DE ARCHIVO VÁLIDO EN EL SCRIPT...</p>';
                return;
            }

            container.innerHTML = ''; // Limpiar contenedor

            for (let slug of posts) {
                // Forzar minúsculas por si GitHub se pone estricto
                slug = slug.toLowerCase().trim();
                
                // Intentamos cargar desde la ruta absoluta
                let urlsToTry = [
                    `/microblog/posts/${slug}.json`,
                    `../microblog/posts/${slug}.json`,
                    `./microblog/posts/${slug}.json`
                ];
                
                let data = null;
                let responseOK = false;

                for (let url of urlsToTry) {
                    try {
                        const response = await fetch(url);
                        if (response.ok) {
                            data = await response.json();
                            responseOK = true;
                            break; 
                        }
                    } catch (e) {
                        // Continuar intentando con la siguiente ruta alternativa
                    }
                }

                if (responseOK && data) {
                    const postElement = document.createElement('article');
                    postElement.className = 'post-card';
                    postElement.innerHTML = `
                        <h2>${data.title || 'TRANSMISIÓN SIN TÍTULO'}</h2>
                        <span class="date-tag">FECHA: ${data.date ? new Date(data.date).toLocaleDateString() : 'DESCONOCIDA'}</span>
                        <p>${data.description || data.body || 'Sin contenido disponible.'}</p>
                        <a href="/Lista/post.html?id=${slug}">LEER_TRANSMISION_&gt;</a>
                    `;
                    container.appendChild(postElement);
                } else {
                    const errorNotice = document.createElement('p');
                    errorNotice.style.cssText = "color: #ff3333; text-align: center; font-size: 0.8rem;";
                    errorNotice.innerHTML = `[ERROR: El archivo <b>${slug}.json</b> no existe en la carpeta microblog/posts/]`;
                    container.appendChild(errorNotice);
                }
            }
        }

        loadPosts();
    </script>
</body>
</html>
