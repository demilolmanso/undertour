<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UT | Lista_de_equipos</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&family=Source+Code+Pro:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Source Code Pro', monospace;
            padding: 40px 20px;
            margin: 0;
        }
        .blog-header { 
            text-align: center; 
            font-family: 'Rubik Glitch', system-ui; 
            color: #7012b3; 
            font-size: 2.5rem; 
            text-transform: uppercase;
        }
        .post-card {
            border: 1px solid #7012b3;
            background: rgba(5,5,5,0.9);
            padding: 20px;
            margin: 20px auto;
            max-width: 600px;
            box-shadow: 4px 4px 0 #82c91e;
        }
        .post-card h2 { color: #82c91e; margin-top: 0; text-transform: uppercase;}
        .post-card p { line-height: 1.5; color: #e0e0e0; white-space: pre-wrap; margin-bottom: 0; }
        .date-tag {
            color: #a0a0a0; 
            font-size: 0.8rem;
            display: block;
            margin-bottom: 12px;
        }
        #loading { text-align: center; color: #82c91e; font-size: 1rem; }
    </style>
</head>
<body>

    <h1 class="blog-header">Equipos</h1>
    <div id="blog-posts-container">
        <p id="loading">[CONECTANDO CON EL UNDERSERVER...]</p>
    </div>

    <script>
        // CONFIGURACIÓN AUTOMÁTICA DE TU REPOSITORIO
        const USER = 'demilolmanso';
        const REPO = 'undertour';
        const FOLDER_PATH = 'microblog/posts';

        const container = document.getElementById('blog-posts-container');

        async function fetchAllPosts() {
            try {
                // Consultamos directamente a GitHub para saber qué archivos existen en la carpeta
                const githubApiUrl = `https://api.github.com/repos/${USER}/${REPO}/contents/${FOLDER_PATH}`;
                const repoResponse = await fetch(githubApiUrl);
                
                if (!repoResponse.ok) throw new Error("No se pudo obtener la lista de transmisiones.");
                
                const files = await repoResponse.json();
                
                // Filtramos para asegurarnos de leer únicamente los archivos .json nuevos
                const jsonFiles = files.filter(file => file.name.endsWith('.json'));

                if (jsonFiles.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color:#7012b3;">NO HAY NADA AUN...</p>';
                    return;
                }

                container.innerHTML = ''; // Limpiamos el mensaje de cargando
                let loadedPosts = [];

                // Descargamos el contenido interno de cada archivo JSON detectado
                for (const file of jsonFiles) {
                    try {
                        const fileResponse = await fetch(`/${FOLDER_PATH}/${file.name}`);
                        if (fileResponse.ok) {
                            const data = await fileResponse.json();
                            loadedPosts.push(data);
                        }
                    } catch (e) {
                        console.error("Error al procesar archivo individual:", e);
                    }
                }

                // Ordenamos las publicaciones cronológicamente (las más nuevas primero)
                loadedPosts.sort((a, b) => new Date(b.date) - new Date(a.date));

                // Renderizamos los componentes visuales en el muro principal
                loadedPosts.forEach(data => {
                    const postElement = document.createElement('article');
                    postElement.className = 'post-card';
                    
                    // Aquí estructuramos el post: Si no tiene título, salta directo al texto de abajo
                    postElement.innerHTML = `
                        ${data.title ? `<h2>${data.title}</h2>` : ''}
                        <span class="date-tag">FECHA: ${data.date ? new Date(data.date).toLocaleDateString() : 'DESCONOCIDA'}</span>
                        <p>${data.body || data.description || 'Sin contenido.'}</p>
                    `;
                    container.appendChild(postElement);
                });

            } catch (error) {
                console.error("Error global del sistema:", error);
                container.innerHTML = '<p style="text-align:center; color:#ff3333;">[ERROR CRÍTICO: FALLO DE SINCRONIZACIÓN CON EL REPOSITORIO DE LA BRECHA]</p>';
            }
        }

        // Ejecutar la sincronización al cargar la página
        fetchAllPosts();
    </script>
</body>
</html>
